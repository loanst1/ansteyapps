<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy — Market Sight</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --color-bg: #ffffff;
    --color-surface: #f8f9fa;
    --color-border: #e0e4e8;
    --color-text: #1a1d21;
    --color-muted: #5a6370;
    --color-accent: #145f59;
    --color-accent-light: #e6f2f1;
    --color-warning-bg: #fffbeb;
    --color-warning-border: #f5d76e;
    --color-warning-text: #7a5c00;
    --max-width: 760px;
    --radius: 8px;
  }

  html { font-size: 16px; }
  body { font-family: var(--font); background: var(--color-bg); color: var(--color-text); line-height: 1.7; padding: 0 1rem; }
  .page-wrapper { max-width: var(--max-width); margin: 0 auto; padding: 2.5rem 0 4rem; }

  .lang-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; padding: 0.75rem 1rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); }
  .lang-bar label { font-size: 0.875rem; font-weight: 600; color: var(--color-muted); white-space: nowrap; }
  .lang-bar select { flex: 1; padding: 0.5rem 0.75rem; font-size: 0.95rem; border: 1px solid var(--color-border); border-radius: 6px; background: white; font-family: var(--font); cursor: pointer; }

  .badge { display: inline-block; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; color: var(--color-accent); background: var(--color-accent-light); border-radius: 999px; text-transform: uppercase; margin-bottom: 1rem; }

  h1 { font-size: 2.25rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; color: var(--color-text); }
  .last-updated { font-size: 0.9rem; color: var(--color-muted); margin-bottom: 1.5rem; }

  hr.divider { border: none; border-top: 1px solid var(--color-accent); margin: 1.5rem 0 2rem; }

  section.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  section.card h2 { font-size: 1.1rem; font-weight: 700; color: var(--color-accent); margin-bottom: 0.5rem; }
  section.card p { margin-bottom: 0.5rem; }
  section.card p:last-child { margin-bottom: 0; }

  .highlight-none { font-weight: 700; color: var(--color-text); }

  .warning-box { background: var(--color-warning-bg); border: 1px solid var(--color-warning-border); border-radius: var(--radius); padding: 1rem 1.25rem; margin: 1.5rem 0; }
  .warning-box p { color: var(--color-warning-text); font-size: 0.9rem; }
  .warning-box strong { color: var(--color-warning-text); }

  .contact { margin-top: 2rem; padding: 1.25rem 1.5rem; background: var(--color-accent-light); border-radius: var(--radius); }
  .contact p { margin-bottom: 0.25rem; }
  .contact a { color: var(--color-accent); font-weight: 600; text-decoration: none; }
  .contact a:hover { text-decoration: underline; }

  footer.site-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border); text-align: center; font-size: 0.85rem; color: var(--color-muted); }

  @media (max-width: 640px) {
    h1 { font-size: 1.75rem; }
    .page-wrapper { padding: 1.5rem 0 3rem; }
  }
</style>
  <link rel="stylesheet" href="/assets/mobile-nav.css" />
</head>
<body>
<div class="page-wrapper">

<div class="lang-bar">
  <label for="lang-select">Language:</label>
  <select id="lang-select" class="lang-select">
    <option value="en">English</option>
    <option value="cy">Cymraeg (Welsh)</option>
    <option value="es">Español</option>
    <option value="es_mx">Español (México)</option>
    <option value="fr">Français</option>
    <option value="fr_ca">Français (Canada)</option>
    <option value="de">Deutsch</option>
    <option value="it">Italiano</option>
    <option value="pt">Português</option>
    <option value="pt_br">Português (Brasil)</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="hi">हिन्दी</option>
    <option value="ar">العربية</option>
    <option value="zh">中文</option>
    <option value="pl">Polski</option>
  </select>
</div>

<div id="policy-content"></div>

<footer class="site-footer">
  <p>Ansteyapps Limited · Company no. 17177054 · Abertillery, Wales, United Kingdom</p>
</footer>

</div>

<script>
const TRANSLATIONS = {
  en: {
    badge: `MARKET SIGHT`,
    title: `Privacy Policy`,
    lastUpdated: `Last updated: April 2026`,
    intro: `<p>Market Sight is published by <strong>Ansteyapps Limited</strong>, a company registered in England and Wales (company no. 17177054, registered office Abertillery, Wales, United Kingdom). This policy explains what data Market Sight handles and how. We have tried to write it plainly.</p>`,
    sections: [
      {
        heading: `What data we collect directly`,
        body: `<p class="highlight-none">Very little.</p><p>Market Sight does not ask you to create an account. There is no login, no password, and no profile. Your in-app preferences (selected language, theme, saved tickers for quick access) are stored locally on your device only.</p>`
      },
      {
        heading: `What happens when you run a stock check`,
        body: `<p>When you search for a stock, ETF, or index, Market Sight sends your query (for example, the ticker "AAPL") to our backend, which then calls Anthropic's Claude API to generate the traffic-light analysis.</p><p>The query contains only the instrument you searched and the analysis parameters. It does not contain your name, email, device identifier, IP address, or any other personally identifying information.</p><p>Anthropic's handling of that query is governed by their own privacy policy (anthropic.com/privacy). We do not retain the query-response pair once the analysis is returned to your device.</p>`
      },
      {
        heading: `Subscription and billing`,
        body: `<p>Market Sight is offered as a paid subscription. All billing is handled by Apple (App Store) or Google (Google Play). Your payment details, name, billing address, and transaction history are processed entirely by the platform — Ansteyapps Limited never sees your payment information.</p><p>We receive only anonymous aggregate subscriber counts and payout reports from Apple and Google. These do not identify individual users.</p>`
      },
      {
        heading: `Device-side storage`,
        body: `<p>Your search history, preferences, and cached analyses are stored locally on your device using the device's standard storage mechanisms. This data never leaves your device unless you explicitly choose to share a screenshot.</p><p>You can clear local data at any time via the app's Settings panel. Uninstalling the app removes all locally stored data.</p>`
      },
      {
        heading: `Crash and error logs`,
        body: `<p>If the app crashes, your device may send an anonymous crash report to Apple or Google as part of their platform-level diagnostics. These reports are controlled by your platform-wide privacy settings (Settings → Privacy on iOS; Settings → Google → Usage &amp; diagnostics on Android) and are not something Ansteyapps Limited operates or accesses.</p><p>Market Sight does not include any third-party analytics, crash reporting, or telemetry SDK of its own.</p>`
      },
      {
        heading: `No third-party tracking`,
        body: `<p>We do not use Google Analytics, Firebase, Facebook SDK, AppsFlyer, Adjust, TikTok Pixel, or any other third-party analytics or advertising service.</p><p>We do not sell, rent, or share data with advertisers, data brokers, or anyone else.</p>`
      },
      {
        heading: `Market Sight is not regulated financial advice`,
        body: `<p>Ansteyapps Limited is not authorised or regulated by the Financial Conduct Authority (FCA) or any other financial regulator. Market Sight is a study tool, not a regulated investment service. Nothing in the app constitutes personalised financial, investment, or tax advice.</p><p>This isn't a privacy issue as such, but it's important context for any data you enter: queries are educational in nature, and we do not build a profile of your investing behaviour.</p>`
      },
      {
        heading: `International users`,
        body: `<p>Market Sight is available in seventeen languages and may be used anywhere Apple and Google distribute it. Data handling is identical regardless of your location. If you are in the EU, UK, or California, the minimal data described above is processed under a legitimate interest in providing the analysis you requested. You can stop all processing at any time by not running searches.</p>`
      },
      {
        heading: `Children`,
        body: `<p>Market Sight is designed for adults. It is not directed at children under 18 and does not knowingly collect data from children.</p>`
      },
      {
        heading: `Your rights`,
        body: `<p>Under UK GDPR and the UK Data Protection Act 2018, you have the right to access, correct, or delete personal data we hold about you. Because we do not hold an account for you, there is generally no personal data to return — but you may still contact us with any query and we will respond within 30 days.</p><p>If you are unsatisfied with our response, you can complain to the Information Commissioner's Office (ico.org.uk).</p>`
      },
      {
        heading: `Changes to this policy`,
        body: `<p>If we change this policy, we will update the "Last updated" date above and, where changes are material, notify users via an in-app notice on next launch.</p>`
      },
      {
        heading: `Cookies and website storage`,
        body: `<p>ansteyapps.com does not set cookies for analytics, advertising, or tracking. We store one preference in your browser's local storage (<code>ansteyapps_lang</code>) to remember the language you selected. This is strictly necessary for the site to display in your chosen language and is exempt from the consent requirement under PECR Regulation 6(4). We do not share any data with third parties.</p>`
      }
    ],
    contactHeading: `Contact`,
    contactBody: `<p><strong>Ansteyapps Limited</strong></p><p>Email: <a href="mailto:support@ansteyapps.com">support@ansteyapps.com</a></p><p>Data protection queries: <a href="mailto:support@ansteyapps.com">support@ansteyapps.com</a> (marked "DPO")</p><p>Registered office: 71 Gladstone Street, Abertillery, NP13 1NE, Wales, United Kingdom</p>`,
    translationNotice: `This policy is offered in seventeen languages for convenience. In the event of any conflict or ambiguity, the English version prevails.`
  }
};

function render(lang) {
  const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
  let html = `<span class="badge">${t.badge}</span>`;
  html += `<h1>${t.title}</h1>`;
  html += `<p class="last-updated">${t.lastUpdated}</p>`;
  html += `<hr class="divider">`;
  html += `<section class="card">${t.intro}</section>`;
  for (const sec of t.sections) {
    html += `<section class="card"><h2>${sec.heading}</h2>${sec.body}</section>`;
  }
  html += `<div class="contact"><h2 style="color:var(--color-accent);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem">${t.contactHeading}</h2>${t.contactBody}</div>`;
  html += `<div class="warning-box"><p><strong>Note on translations:</strong> ${t.translationNotice}</p></div>`;
  document.getElementById('policy-content').innerHTML = html;
  document.documentElement.lang = lang === 'cy' ? 'cy' : lang.split('_')[0];
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
}

const select = document.getElementById('lang-select');
select.addEventListener('change', (e) => render(e.target.value));
render('en');
</script>

</body>
</html>
