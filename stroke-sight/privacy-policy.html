  .lang-bar {

    gap: 0.75rem;
    margin-bottom: 2.5rem;
    padding: 0.75rem 1rem;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
  }

  .lang-bar label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--color-muted);
    white-space: nowrap;
  }

  .lang-select {
    flex: 1;
    padding: 0.45rem 0.75rem;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    font-size: 0.9375rem;
    font-family: var(--font);
    color: var(--color-text);
    cursor: pointer;
    max-width: 280px;
    appearance: auto;
  }

  .lang-select:focus {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  /* Translation notice */
  .translation-notice {
    display: none;
    margin-bottom: 1.75rem;
    padding: 0.875rem 1.125rem;
    background: var(--color-warning-bg);
    border: 1px solid var(--color-warning-border);
    border-radius: var(--radius);
    font-size: 0.9375rem;
    color: var(--color-warning-text);
    line-height: 1.5;

    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--color-accent);
  }

  .app-badge {
    display: inline-block;
    margin-bottom: 0.75rem;
    padding: 0.25rem 0.75rem;
    background: var(--color-accent-light);
    color: var(--color-accent);
    border-radius: 100px;
    font-size: 0.8125rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 1.875rem;
    font-weight: 700;
    line-height: 1.25;
    color: var(--color-text);
    margin-bottom: 0.5rem;
  }

  .last-updated {
    font-size: 0.9rem;
    color: var(--color-muted);
  }

  /* Sections */
  .policy-section {
    margin-bottom: 1.75rem;
    padding: 1.25rem 1.375rem;
    background: var(--color-surface);
    border-radius: var(--radius);
    border: 1px solid var(--color-border);
  }

  .policy-section h2 {
    font-size: 1.0625rem;
    font-weight: 700;
    color: var(--color-accent);
    margin-bottom: 0.625rem;
  }

  .policy-section p {
    font-size: 0.9375rem;
    color: var(--color-text);
    margin-bottom: 0.5rem;
  }

  .policy-section p:last-child { margin-bottom: 0; }

  .highlight-none {
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--color-accent);
  }

    margin-top: 2rem;
    padding: 1.25rem 1.375rem;
    border: 1px solid var(--color-border);
    border-radius: var(--radius);

    font-weight: 700;
    color: var(--color-accent);
    margin-bottom: 0.625rem;

    border-top: 1px solid var(--color-border);
    text-align: center;
    font-size: 0.8125rem;

    .lang-bar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }

</style>

function renderPolicy(t) {
  const sectionsHtml = t.sections.map(s => `
    <div class="policy-section">
      <h2>${s.heading}</h2>
      ${s.body}
    </div>
  `).join('');

  return `
    <header class="policy-header">
      <div class="app-badge">${t.badge}</div>
      <h1>${t.heading}</h1>
      <p class="last-updated">${t.lastUpdated}</p>
    </header>
    <div class="policy-section">
      <p>${t.intro}</p>
    </div>
    ${sectionsHtml}
    <div class="contact-block">
      <h2>${t.contactHeading}</h2>
      ${t.contactBody}
    </div>
  `;
}

function setLanguage(code) {
  const t = TRANSLATIONS[code];
  if (!t) return;

  const html = document.documentElement;
  html.setAttribute('lang', t.lang);
  html.setAttribute('dir', t.dir);
  document.title = t.title;

  const notice = document.getElementById('translation-notice');
  if (t.translationNotice) {
    notice.textContent = t.translationNotice;
    notice.classList.add('visible');
  } else {
    notice.textContent = '';
    notice.classList.remove('visible');
  }

  document.getElementById('lang-label').textContent = t.langLabel;
  document.getElementById('policy-content').innerHTML = renderPolicy(t);
}

// Initialize with English
setLanguage('en');
