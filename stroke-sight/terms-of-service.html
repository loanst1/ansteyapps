function renderSection(section) {
  const div = document.createElement('div');
  div.className = 'policy-section';
  const h2 = document.createElement('h2');
  h2.textContent = section.heading;
  div.appendChild(h2);
  const bodyWrap = document.createElement('div');
  bodyWrap.innerHTML = section.body;
  while (bodyWrap.firstChild) div.appendChild(bodyWrap.firstChild);
  return div;
}

function renderContact(t) {
  const div = document.createElement('div');
  div.className = 'contact-block';
  const h2 = document.createElement('h2');
  h2.textContent = t.contactHeading;
  div.appendChild(h2);
  const bodyWrap = document.createElement('div');
  bodyWrap.innerHTML = t.contactBody;
  while (bodyWrap.firstChild) div.appendChild(bodyWrap.firstChild);
  return div;
}

function setLanguage(code) {
  const t = TRANSLATIONS[code] || TRANSLATIONS.en;
  document.documentElement.lang = t.lang;
  document.documentElement.dir = t.dir;
  document.title = t.title;
  document.getElementById('lang-label').textContent = t.langLabel;

  const sel = document.getElementById('lang-select');
  if (sel) sel.value = code;

  const notice = document.getElementById('translation-notice');
  if (t.translationNotice) {
    notice.textContent = t.translationNotice;
    notice.style.display = '';
  } else {
    notice.textContent = '';
    notice.style.display = 'none';
  }

  const content = document.getElementById('policy-content');
  content.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.className = 'policy-header';
  const badge = document.createElement('span');
  badge.className = 'app-badge';
  badge.textContent = t.badge;
  const h1 = document.createElement('h1');
  h1.textContent = t.heading;
  const lu = document.createElement('p');
  lu.className = 'last-updated';
  lu.textContent = t.lastUpdated;
  header.appendChild(badge);
  header.appendChild(h1);
  header.appendChild(lu);
  content.appendChild(header);

  // Sections
  for (const s of t.sections) content.appendChild(renderSection(s));

  // Contact
  content.appendChild(renderContact(t));

  // Footer
  document.getElementById('policy-footer').textContent = t.footer;

  try { localStorage.setItem('ansteyapps_lang', code); } catch (e) {}
}

// On load: localStorage → navigator.languages → en
(function init() {
  let code = null;
  try { code = localStorage.getItem('ansteyapps_lang'); } catch (e) {}
  if (!code) {
    const langs = (navigator.languages || [navigator.language || 'en']);
    for (const raw of langs) {
      const norm = raw.replace('_', '-');
      if (TRANSLATIONS[norm]) { code = norm; break; }
      // Try mapping short codes to a sensible regional default
      const short = norm.toLowerCase().split('-')[0];
      const fallbacks = {
        'en': 'en', 'cy': 'cy', 'de': 'de', 'it': 'it', 'pl': 'pl',
        'ar': 'ar', 'ja': 'ja', 'ko': 'ko', 'zh': 'zh', 'hi': 'hi',
        'es': 'es-ES', 'fr': 'fr-FR', 'pt': 'pt-PT',
      };
      if (fallbacks[short]) { code = fallbacks[short]; break; }
    }
  }
  if (!code || !TRANSLATIONS[code]) code = 'en';
  setLanguage(code);
})();
</script>
